        userMultiplied: false
      - label: Rate limit
        name: explorer_lite_rate
        type: quota
        metric: requests_per_second
        limit: 5
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Daily call quota
